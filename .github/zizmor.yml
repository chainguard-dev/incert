rules:
  # Paired with `cooldown.default-days: 3` in .github/dependabot.yaml.
  dependabot-cooldown:
    config:
      days: 3
  # Cosmetic pedantic-only findings — suppressed across the campaign.
  anonymous-definition:
    disable: true
  undocumented-permissions:
    disable: true
  concurrency-limits:
    disable: true
